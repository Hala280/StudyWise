
<h2 class="sr-only">StudyWise Entity Relationship Diagram showing all tables and their relationships</h2>
<style>
#erd-wrap { padding: 1rem 0; }
#erd svg { width: 100%; }
.erd-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 1rem; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
<div id="erd-wrap">
  <div id="erd"></div>
  <div class="erd-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div>Core identity</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div>Course content</div>
    <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>Scheduling</div>
    <div class="legend-item"><div class="legend-dot" style="background:#993556"></div>Progress tracking</div>
    <div class="legend-item"><div class="legend-dot" style="background:#888780"></div>Crow's foot: one-to-many ||--o{</div>
  </div>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2860' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
  },
});
const diagram = `erDiagram
  AspNetUsers {
    UNIQUEIDENTIFIER Id PK
    NVARCHAR Email
    NVARCHAR UserName
    NVARCHAR PasswordHash
    NVARCHAR FullName
    DATETIME2 CreatedAt
  }
  Courses {
    INT Id PK
    UNIQUEIDENTIFIER UserId FK
    NVARCHAR Title
    NVARCHAR Description
    DATE ExamDate
    INT EstimatedTotalHours
    DATETIME2 CreatedAt
  }
  Topics {
    INT Id PK
    INT CourseId FK
    NVARCHAR Title
    INT EstimatedHours
    INT OrderIndex
    BIT IsCompleted
    DATETIME2 CreatedAt
  }
  AvailabilityWindows {
    INT Id PK
    UNIQUEIDENTIFIER UserId FK
    TINYINT DayOfWeek
    TIME StartTime
    TIME EndTime
  }
  StudyBlocks {
    INT Id PK
    INT TopicId FK
    UNIQUEIDENTIFIER UserId FK
    DATE ScheduledDate
    TIME StartTime
    TIME EndTime
    INT DurationMinutes
    BIT IsCompleted
    BIT IsMissed
    DATETIME2 CompletedAt
  }
  ExamEvents {
    INT Id PK
    INT CourseId FK
    UNIQUEIDENTIFIER UserId FK
    NVARCHAR Title
    DATE EventDate
    NVARCHAR EventType
    BIT IsProtected
  }
  StudyStreaks {
    INT Id PK
    UNIQUEIDENTIFIER UserId FK
    DATE StreakDate
    INT BlocksCompleted
    INT MinutesStudied
  }

  AspNetUsers ||--o{ Courses : owns
  AspNetUsers ||--o{ AvailabilityWindows : configures
  AspNetUsers ||--o{ StudyBlocks : has
  AspNetUsers ||--o{ ExamEvents : adds
  AspNetUsers ||--o{ StudyStreaks : tracks
  Courses ||--o{ Topics : contains
  Courses ||--o{ ExamEvents : has
  Topics ||--o{ StudyBlocks : generates
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
